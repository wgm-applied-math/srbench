name: brush
channels:
    - conda-forge
dependencies:
    - python=3.12.0
    - cmake=3.27.6
    - eigen=3.4.*
    - fmt=10.1.1
    - gcc=13.2.0 # although brush's original env uses a generic compiler, here we want a linux specific with fixed version due to incompatibility issues when using cxx-compiler
    - gxx=13.2.0
    - ninja=1.11.1
    - ceres-solver=2.2.0
    - glog=0.6.0
    - gflags=2.2.2
    # - boost-cpp=1.78.0
    # - libboost-devel
    - pybind11=2.11.1
    - taskflow=3.6.0
    - pytest=7.4.3
    - pydot=1.4.2
    - scikit-learn=1.3.2
    - scikit-build-core
    - pandas=2.1.3
    # not required to install the c++ library (but used in the wrapper)
    - jupyter
    - ipython
    - pip
    - nlohmann_json=3.11.2
    - pybind11_json=0.2.13
    # Building documentation
    - doxygen
    - sphinx=7.2.6
    - pip:
      - graphviz
      # - deap # optional
      # - pmlb # used only for testing
      